# Catálogo de Componentes — Fonte única de verdade do template
# Consumido por /new-project para seleção do que copiar para cada projeto filho.
#
# Regras de seleção:
#   - scope: core     → copiado para TODO projeto, sem exceção
#   - scope: optional → copiado SÓ se TODAS as dimensões que o componente DECLARA casarem
#                       (AND entre dimensões, não OR achatado): para cada dimensão presente
#                       (stacks / domains / clouds) tem que haver interseção com a entrevista;
#                       dimensão ausente = curinga. Ex.: clouds:[aws]+stacks:[python] NÃO entra
#                       em cloud=local só porque "python" casou.
#   - scope: project  → nunca vive no template; criado dentro do projeto filho
#                       (ex.: {projeto}-expert, KBs de regra de negócio)
#
# Taxonomia (alinhar com a entrevista do /new-project e /project-init):
#   domains: api-web | data-pipeline | ai-llm | cli | frontend-fullstack | infra-devops
#   clouds:  aws | gcp | azure | databricks | local
#   stacks:  nomes de tecnologia em kebab-case (python, spark, fastapi, terraform...)
#
# CONVENÇÃO de `stacks` (evita falso-positivo): liste em `stacks` SÓ tokens que devem
# disparar match sozinhos. NÃO misture uma linguagem genérica (python) com um framework
# específico (aws-lambda, pyspark) na mesma lista — o OR-dentro-da-dimensão casaria pelo
# token genérico e puxaria o componente p/ qualquer projeto naquela linguagem. Se o
# discriminador é o framework, liste só o framework. `python` em stacks só quando o
# componente serve a QUALQUER projeto Python (ex.: python-developer, code-cleaner).

version: "1.0"
updated: "2026-06-10"

